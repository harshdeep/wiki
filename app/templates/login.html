<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log in · Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Outfit:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v={{ static_version() }}" />
    <script>
      (function () {
        const stored = localStorage.getItem("theme");
        if (stored === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body class="login-page">
    <main>
      <form class="login-form" method="post" action="/login">
        <h1>Wiki</h1>
        <p class="login-form-subtitle">Personal knowledge base</p>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <label for="pwd">Password</label>
        <input id="pwd" type="password" name="password" autofocus required />
        <input type="hidden" name="next" value="{{ next }}" />
        <button type="submit">Enter</button>
      </form>
    </main>
  </body>
</html>
