<div class="add-source" data-state="idle">
  <button type="button"
          class="add-source-trigger"
          aria-label="Add source"
          title="Add source">+</button>

  <form class="add-source-form"
        action="/sources/new"
        method="post"
        autocomplete="off">
    <input class="add-source-input"
           type="url"
           name="url"
           required
           placeholder="Paste a URL…">
    {% if prefill_topic %}
      <input type="hidden" name="topic" value="{{ prefill_topic }}">
    {% endif %}
    <button type="submit"
            class="add-source-submit"
            aria-label="Save"
            title="Save">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 13l4 4L19 7"/>
      </svg>
    </button>
    <button type="button"
            class="add-source-cancel"
            aria-label="Cancel"
            title="Cancel">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </form>

  <div class="add-source-status" role="status" aria-live="polite"></div>

  <div class="add-source-processing" role="status" aria-live="polite">
    <span class="add-source-processing-label">Scraping and extracting concepts…</span>
  </div>

  <div class="add-source-done" role="status" aria-live="polite">
    <span class="add-source-done-label">Extracted:</span>
    <ul class="add-source-concepts"></ul>
    <span class="add-source-done-empty" hidden>No new concepts this time.</span>
  </div>
</div>
