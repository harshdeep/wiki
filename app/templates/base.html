<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Wiki{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E" />
    <script>
      (function () {
        const stored = localStorage.getItem("theme");
        if (stored === "dark" || stored === "light") {
          document.documentElement.setAttribute("data-theme", stored);
        }
      })();
    </script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">📚 Wiki</a>
      <nav class="topnav">
        <button id="theme-toggle" type="button" aria-label="Toggle theme">🌓</button>
        <form method="post" action="/logout" class="logout">
          <button type="submit">Log out</button>
        </form>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script>
      (function () {
        const btn = document.getElementById("theme-toggle");
        if (!btn) return;
        btn.addEventListener("click", function () {
          const current =
            document.documentElement.getAttribute("data-theme") ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          const next = current === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
        });
      })();
    </script>
  </body>
</html>
