<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Wiki{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="/static/style.css?v={{ static_version() }}" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1e'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-style='italic' fill='%23c9a96e'%3EW%3C/text%3E%3C/svg%3E" />

    <script>
      (function () {
        const stored = localStorage.getItem("theme");
        if (stored === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">W.</span>
        <span class="brand-text">Wiki</span>
      </a>
      <nav class="topnav">
        <button id="theme-toggle" type="button" class="nav-btn" aria-label="Toggle theme" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <form method="post" action="/logout" class="logout-form">
          <button type="submit" class="nav-btn nav-btn-text">Log out</button>
        </form>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script>
      // Theme toggle
      (function () {
        const btn = document.getElementById("theme-toggle");
        if (!btn) return;
        btn.addEventListener("click", function () {
          const current = document.documentElement.getAttribute("data-theme") || "dark";
          const next = current === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
        });
      })();

      // KaTeX: render inline/display math inside .markdown regions.
      // Runs after the deferred katex + auto-render scripts have loaded.
      (function () {
        function renderMath() {
          if (typeof renderMathInElement !== "function") return;
          document.querySelectorAll(".markdown").forEach(function (el) {
            renderMathInElement(el, {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "\\[", right: "\\]", display: true },
                { left: "\\(", right: "\\)", display: false },
                { left: "$", right: "$", display: false },
              ],
              throwOnError: false,
              ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"],
            });
          });
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", renderMath);
        } else {
          renderMath();
        }
      })();

      // Add-source inline form
      (function () {
        const ERROR_MS = 4500;
        const DONE_MS = 12000;
        const POLL_MS = 3000;

        function setState(root, state) {
          root.dataset.state = state;
        }

        function showError(root, text) {
          const status = root.querySelector(".add-source-status");
          if (status) status.textContent = text;
          setState(root, "error");
          window.setTimeout(function () {
            if (root.dataset.state === "error") setState(root, "idle");
          }, ERROR_MS);
        }

        function showDone(root, concepts) {
          const doneEl = root.querySelector(".add-source-done");
          const list = root.querySelector(".add-source-concepts");
          const empty = root.querySelector(".add-source-done-empty");
          if (!doneEl || !list) return;

          list.innerHTML = "";
          if (concepts && concepts.length > 0) {
            if (empty) empty.hidden = true;
            concepts.forEach(function (c) {
              const li = document.createElement("li");
              const a = document.createElement("a");
              a.href = "/concepts/" + c.slug;
              a.textContent = c.title;
              li.appendChild(a);
              list.appendChild(li);
            });
          } else {
            if (empty) empty.hidden = false;
          }
          setState(root, "done");
          window.setTimeout(function () {
            if (root.dataset.state === "done") setState(root, "idle");
          }, DONE_MS);
        }

        function startPolling(root) {
          setState(root, "processing");
          const interval = window.setInterval(async function () {
            // Stop polling if user dismissed or navigated away
            if (!document.body.contains(root)) {
              window.clearInterval(interval);
              return;
            }
            // Stop if user already dismissed to idle
            if (root.dataset.state === "idle") {
              window.clearInterval(interval);
              return;
            }
            try {
              const resp = await fetch("/sources/status", {
                headers: { "Accept": "application/json" },
                credentials: "same-origin",
              });
              if (!resp.ok) return;
              const data = await resp.json();
              if (data.status === "done") {
                window.clearInterval(interval);
                showDone(root, data.concepts);
              } else if (data.status === "error") {
                window.clearInterval(interval);
                showError(root, data.error || "Processing failed. Check nkr logs.");
              }
            } catch (_) { /* network blip — try again next tick */ }
          }, POLL_MS);
        }

        function bind(root) {
          const trigger = root.querySelector(".add-source-trigger");
          const form = root.querySelector(".add-source-form");
          const input = root.querySelector(".add-source-input");
          const cancel = root.querySelector(".add-source-cancel");
          const submit = root.querySelector(".add-source-submit");
          if (!trigger || !form || !input || !cancel || !submit) return;

          trigger.addEventListener("click", function () {
            setState(root, "open");
            window.setTimeout(function () { input.focus(); }, 30);
          });

          cancel.addEventListener("click", function () {
            form.reset();
            setState(root, "idle");
          });

          input.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
              form.reset();
              setState(root, "idle");
            }
          });

          form.addEventListener("submit", async function (e) {
            e.preventDefault();
            if (root.dataset.state === "loading") return;
            setState(root, "loading");
            submit.disabled = true;
            try {
              const resp = await fetch(form.action, {
                method: "POST",
                body: new FormData(form),
                headers: { "Accept": "application/json" },
                credentials: "same-origin",
              });
              form.reset();
              if (!resp.ok) {
                let msg = "Couldn't add the source. Try again?";
                try {
                  const j = await resp.json();
                  if (j && j.error) msg = j.error;
                } catch (_) {}
                showError(root, msg);
                return;
              }
              const data = await resp.json();
              if (data.duplicate) {
                showDone(root, []);
                return;
              }
              startPolling(root);
            } catch (err) {
              form.reset();
              showError(root, "Network error. Try again?");
            } finally {
              submit.disabled = false;
            }
          });
        }

        document.querySelectorAll(".add-source").forEach(bind);
      })();
    </script>
  </body>
</html>
